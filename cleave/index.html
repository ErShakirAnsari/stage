    <script>
      // Applied before the app mounts so there's no flash of the wrong
      // theme. React re-derives and re-applies the same value on load.
      (function () {
        try {
          var raw = localStorage.getItem('cleave:settings');
          var theme = raw ? JSON.parse(raw).theme : 'system';
          var resolved =
            theme === 'light' || theme === 'dark'
              ? theme
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
