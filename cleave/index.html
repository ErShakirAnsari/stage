<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cleave — split and join large files</title>
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Applied before the app mounts so there's no flash of the wrong
      // theme. React re-derives and re-applies the same value on load.
      (function () {
        try {
          var raw = localStorage.getItem('cleave:settings');
          var theme = raw ? JSON.parse(raw).theme : 'system';
          var resolved =
            theme === 'light' || theme === 'dark'
              ? theme
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="https://cdn.jsdelivr.net/gh/ershakiransari/stage@master/cleave/assets/index-C2cZOluZ.js">
</script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/ershakiransari/stage@master/cleave/assets/index-i2K6aTtW.css">
  </head>
  <body>
    <div id="root">
</div>
  </body>
</html>
